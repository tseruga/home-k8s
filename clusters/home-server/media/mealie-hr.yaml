---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: mealie
  namespace: media
spec:
  chart:
    spec:
      chart: mealie
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: k8s-at-home
      version: 5.1.2
  interval: 1m0s
  values:
    image:
      repository: ghcr.io/mealie-recipes/mealie
      tag: "v3.20.1"
    api:
      image:
        repository: ghcr.io/mealie-recipes/mealie
        tag: "v3.20.1"
    ingress:
      main:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
        ingressClassName: nginx
        hosts:
          - host: mealie.tseruga.com
            paths:
              - path: /
                pathType: Prefix
        tls:
          - secretName: mealie-tls
            hosts:
              - mealie.tseruga.com
    service:
      main:
        type: LoadBalancer
        loadBalancerIP: 192.168.1.220
        externalTrafficPolicy: Local
    persistence:
      config:
        enabled: true
        type: pvc
        accessMode: ReadWriteOnce
        size: 1Gi